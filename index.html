<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your App Name</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container { max-width: 460px; text-align: center; }
  h1 { font-size: 1.8rem; margin-bottom: 12px; }
  p { color: #9da7b3; line-height: 1.6; margin-bottom: 24px; }
  .btn {
    display: inline-block;
    padding: 12px 32px;
    background: #2f81f7;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Your App Name</h1>
    <p>A short description of what your app does.</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=your.package.name">Get it on Google Play</a>
  </div>
</body>
</html>
